<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0d0d0f">
  <meta name="description" content="Fast, offline QR code scanner. Scan with your camera or an image file.">
  <title>QR Scanner</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <main class="app">
    <header class="app__header">
      <h1>QR Scanner</h1>
      <p class="app__subtitle">Scan with your camera or an image</p>
    </header>

    <section class="scanner" aria-label="Scanner">
      <div class="scanner__viewport">
        <video id="video" playsinline muted autoplay></video>
        <div id="overlay" class="scanner__overlay" hidden>
          <div class="scanner__frame"></div>
        </div>
        <div id="status" class="scanner__status" role="status" aria-live="polite"></div>
      </div>

      <div class="scanner__controls">
        <button id="retryBtn" class="btn btn--primary" type="button" hidden>Retry camera</button>
      </div>

      <label class="filepick">
        <input id="fileInput" type="file" accept="image/*" hidden>
        <span class="btn btn--ghost">Scan an image file</span>
      </label>
    </section>

    <section id="result" class="result" hidden aria-live="polite">
      <p class="result__label">Decoded</p>
      <p id="resultText" class="result__text"></p>
      <div class="result__actions">
        <button id="copyBtn" class="btn btn--ghost" type="button">Copy</button>
        <a id="openBtn" class="btn btn--primary" href="#" target="_blank" rel="noopener noreferrer" hidden>Open</a>
        <button id="clearBtn" class="btn btn--ghost" type="button">Dismiss</button>
      </div>
    </section>
  </main>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
